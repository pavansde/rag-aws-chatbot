<svg width="900" height="520" viewBox="0 0 900 520" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="900" height="520" fill="#ffffff"/>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#444444" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Section labels -->
  <text x="40" y="35" font-size="16" font-weight="bold" fill="#333333">Ingest pipeline</text>
  <text x="40" y="285" font-size="16" font-weight="bold" fill="#333333">Query pipeline</text>

  <!-- Ingest pipeline -->
  <rect x="40" y="55" width="130" height="50" rx="8" fill="#F5C4B3" stroke="#993C1D"/>
  <text x="105" y="85" font-size="13" text-anchor="middle" fill="#4A1B0C">S3 bucket</text>

  <line x1="170" y1="80" x2="220" y2="80" stroke="#444444" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="220" y="55" width="150" height="50" rx="8" fill="#9FE1CB" stroke="#0F6E56"/>
  <text x="295" y="80" font-size="13" text-anchor="middle" fill="#04342C">Lambda: ingest</text>

  <line x1="370" y1="80" x2="420" y2="80" stroke="#444444" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="420" y="55" width="130" height="50" rx="8" fill="#CECBF6" stroke="#3C3489"/>
  <text x="485" y="80" font-size="13" text-anchor="middle" fill="#26215C">Bedrock</text>
  <text x="485" y="96" font-size="10" text-anchor="middle" fill="#26215C">Titan Embeddings</text>

  <line x1="485" y1="105" x2="485" y2="165" stroke="#444444" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="500" y="140" font-size="11" fill="#555555">embeddings</text>

  <rect x="400" y="165" width="170" height="50" rx="8" fill="#F4C0D1" stroke="#993556"/>
  <text x="485" y="195" font-size="13" text-anchor="middle" fill="#4B1528">OpenSearch Serverless</text>

  <!-- Query pipeline -->
  <rect x="40" y="305" width="150" height="50" rx="8" fill="#D3D1C7" stroke="#5F5E5A"/>
  <text x="115" y="335" font-size="13" text-anchor="middle" fill="#2C2C2A">API Gateway</text>

  <line x1="190" y1="330" x2="240" y2="330" stroke="#444444" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="240" y="305" width="150" height="50" rx="8" fill="#9FE1CB" stroke="#0F6E56"/>
  <text x="315" y="335" font-size="13" text-anchor="middle" fill="#04342C">Lambda: query</text>

  <!-- query -> opensearch -->
  <path d="M315 305 L315 240 L485 240 L485 220" fill="none" stroke="#444444" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="400" y="235" font-size="11" fill="#555555">similarity search</text>

  <!-- query -> bedrock llm -->
  <line x1="390" y1="330" x2="620" y2="330" stroke="#444444" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="620" y="305" width="150" height="50" rx="8" fill="#CECBF6" stroke="#3C3489"/>
  <text x="695" y="330" font-size="13" text-anchor="middle" fill="#26215C">Bedrock LLM</text>
  <text x="695" y="346" font-size="10" text-anchor="middle" fill="#26215C">Nova Lite</text>

  <!-- CloudWatch -->
  <rect x="40" y="430" width="730" height="60" rx="10" fill="#FAC775" stroke="#854F0B"/>
  <text x="60" y="455" font-size="13" font-weight="bold" fill="#412402">CloudWatch</text>
  <text x="60" y="475" font-size="11" fill="#412402">Logs and metrics from both Lambda functions — dashboard + latency alarm</text>

  <line x1="295" y1="105" x2="180" y2="430" stroke="#888888" stroke-width="1" stroke-dasharray="4 4" opacity="0.5"/>
  <line x1="315" y1="355" x2="380" y2="430" stroke="#888888" stroke-width="1" stroke-dasharray="4 4" opacity="0.5"/>
</svg>